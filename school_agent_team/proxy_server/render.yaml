services:
  - type: web
    name: school-agent-team-openai-proxy
    env: node
    region: oregon
    plan: free
    buildCommand: ""
    startCommand: "npm start"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: MAX_BODY_BYTES
        value: "262144"
      - key: MAX_MESSAGES
        value: "24"
      - key: MAX_CONTENT_CHARS
        value: "30000"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
